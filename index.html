<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Next Book</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F0F14; color: #E8E8F8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .logo { font-size: 2.5rem; font-weight: 800; color: #A78BFA; margin-bottom: 0.5rem; }
    .tagline { font-size: 1.1rem; color: #B0B0D0; margin-bottom: 2.5rem; text-align: center; max-width: 420px; }
    .guarantee { font-size: 1.25rem; font-weight: 600; color: #fff; text-align: center; max-width: 400px; margin-bottom: 2.5rem; line-height: 1.5; }
    .links { display: flex; gap: 1.5rem; }
    .links a { color: #A78BFA; text-decoration: none; font-size: 0.95rem; }
    .links a:hover { text-decoration: underline; }
    .badges { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; justify-content: center; margin-top: 2.5rem; }
    .badges img { height: 48px; }
    .badge-coming { display: flex; align-items: center; gap: 0.6rem; background: #1E1E2C; border: 1px solid #2E2E40; border-radius: 10px; padding: 0.6rem 1.2rem; color: #B0B0D0; font-size: 0.85rem; height: 48px; cursor: default; }
    .badge-coming svg { opacity: 0.6; }
  </style>
</head>
<body>
  <div class="logo">📖 My Next Book</div>
  <p class="tagline">Find your next favorite book — based on your taste, not just your genre.</p>
  <p class="guarantee">We guarantee the next book you read will be one you love.</p>
  <div class="links">
    <a href="/privacy">Privacy Policy</a>
    <a href="/support">Support</a>
  </div>
  <div class="badges">
    <a href="https://apps.apple.com/app/id6763831526">
      <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store" />
    </a>
    <div class="badge-coming">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#B0B0D0"><path d="M3.18 23c-.06 0-.12-.01-.18-.03a.5.5 0 0 1-.32-.47V1.5a.5.5 0 0 1 .5-.5c.1 0 .2.03.28.09l17.64 10.5a.5.5 0 0 1 0 .86L3.46 22.94a.5.5 0 0 1-.28.06z"/></svg>
      Android — Coming Soon
    </div>
  </div>
</body>
</html>
